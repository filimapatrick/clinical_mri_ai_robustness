# Controlled Image Degradation Configuration

degradations:
  blur:
    description: "Gaussian smoothing (spatial blur)"
    levels:
      L0: 0.0  # Baseline (no degradation)
      L1: 1.0  # Mild blur (sigma in mm)
      L2: 2.0  # Moderate blur
      L3: 3.0  # Severe blur

  noise:
    description: "Additive Gaussian noise"
    levels:
      L0: 0.0   # Baseline
      L1: 0.02  # Mild noise (relative std dev)
      L2: 0.05  # Moderate noise
      L3: 0.10  # Severe noise

  resolution:
    description: "Anisotropic voxel downsampling & interpolation"
    levels:
      L0: [1.0, 1.0, 1.0]  # Baseline (1mm isotropic)
      L1: [1.0, 1.0, 2.0]  # Thicker slices (2mm slice thickness)
      L2: [1.0, 1.0, 4.0]  # Thick clinical slices (4mm slice thickness)
      L3: [2.0, 2.0, 5.0]  # Highly anisotropic low-res scan

  motion:
    description: "Simulated rigid movement phase perturbation"
    levels:
      L0: { frequency: 0.0, amplitude: 0.0 }
      L1: { frequency: 2.0, amplitude: 0.05 }
      L2: { frequency: 4.0, amplitude: 0.10 }
      L3: { frequency: 8.0, amplitude: 0.20 }
